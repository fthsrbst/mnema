name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      valkey:
        image: valkey/valkey:8.1.8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - name: Install server dependencies
        run: npm ci
      - name: Install web dependencies
        run: npm --prefix web ci
      - name: Reject tracked runtime databases
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)(data|backups)/|\.(db|sqlite|sqlite3)(-(wal|shm))?$'; then
            echo "Runtime data must never be committed; use Mnema sync."
            exit 1
          fi
      - name: Build server
        run: npm run build
      - name: Lint and build web
        run: npm --prefix web run lint && npm --prefix web run build
      - name: Hosted container manifest and image
        env:
          MNEMA_ENV_FILE: .env.cloud.example
        run: |
          docker compose --env-file deploy/cloud/.env.cloud.example -f deploy/cloud/compose.yaml config --quiet
          docker compose --env-file deploy/cloud/.env.cloud.example -f deploy/cloud/compose.yaml build
      - name: Community regression suite
        env:
          GEMINI_API_KEY: ""
        run: npm run smoke
      - name: Self-host authorization suite
        run: npm run smoke:security
      - name: Cloud tenant and billing suite
        env:
          CLOUD_TEST_REDIS_URL: redis://127.0.0.1:6379
        run: npm run smoke:cloud
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
